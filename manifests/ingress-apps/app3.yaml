apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
  namespace: ingress-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app3
  namespace: ingress-app
spec:
  selector:
    app: app3
  ports:
  - port: 80
    targetPort: 80
